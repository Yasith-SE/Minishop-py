{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 rounded-4 p-4">
            <h3 class="text-center mb-4">Login</h3>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-danger w-100 rounded-pill mt-3">Login</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
