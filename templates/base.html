{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minishop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .custom-navbar { background-color: #c4272b; color: white; padding: 15px 0; }
        .custom-navbar a { color: white; text-decoration: none; margin-right: 20px; }
        .search-bar { border-radius: 20px; padding: 8px 20px; width: 100%; border: none; }
        .nav-links { margin-top: 15px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body class="bg-light">

    <header class="custom-navbar">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-3">
                    <h3 class="mb-0"><i class="fas fa-store"></i> Minishop</h3>
                </div>
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" class="form-control search-bar" placeholder="Search in Minishop...">
                    </div>
                </div>
                <div class="col-md-3 text-end">
                    <a href="#"><i class="fas fa-shopping-cart"></i> Cart</a>
                    <a href="#"><i class="fas fa-sign-in-alt"></i> Login</a>
                    <a href="#"><i class="fas fa-user-plus"></i> Sign Up</a>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-12 nav-links">
                    <a href="{% url 'core:home' %}">Home</a>
                    <a href="#">Electronics</a>
                    <a href="#">Fashion</a>
                    <a href="#">Beauty</a>
                    <a href="#">Toys</a>
                </div>
            </div>
        </div>
    </header>

    <main class="container my-4">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
